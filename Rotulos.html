<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diseños UCR</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Rotulos.css">
</head>
<body>
 
  <!-- DISEÑO 1: BANNER -->
  <div class="seccion">
    <p class="titulo-seccion">Diseño 1 — Banner</p>
    <div class="banner">
      <div class="banner-titulo">
        <span class="signo-apertura">¡</span>
        <div class="bloque-la-sede"><span>La Sede</span></div>
      </div>
      <div class="banner-segunda-linea">
        <div class="bloque-te"><span>Te</span></div>
        <span class="texto-acompana">Acompaña</span>
        <div class="signo-cierre">
          <div class="exclamacion-cuerpo"></div>
          <div class="exclamacion-punto"></div>
        </div>
      </div>
      <div class="banner-texto">
        <p>El respeto no se negocia</p>
        <p class="subtexto">¡Pará ya de acosar!</p>
      </div>
    </div>
  </div>
 
  <!-- DISEÑO 2: PANEL UCR -->
  <div class="seccion">
    <p class="titulo-seccion">Diseño 2 — Panel UCR</p>
    <div class="panel-ucr">
      <div class="panel-filas">
        <div class="panel-fila">
          <span class="fila-texto">Aulas 5, 6, 7</span>
          <span class="flecha">➔</span>
        </div>
        <div class="panel-fila">
          <span class="fila-texto">Apoyo Informático</span>
          <span class="flecha">➔</span>
        </div>
        <div class="panel-fila">
          <span class="fila-texto">Servidores</span>
          <span class="flecha">➔</span>
        </div>
        <div class="panel-fila">
          <span class="fila-texto">Laboratorio 1 y 2</span>
          <span class="flecha">➔</span>
        </div>
        <div class="panel-fila">
          <span class="fila-texto">Coordinación<br>Informática Empresarial</span>
          <span class="flecha">➔</span>
        </div>
      </div>
      <div class="panel-footer">
        <span>UCR</span>
      </div>
    </div>
  </div>
 
</body>
</html>
